<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Browse our gallery of stunning events, delicious food, beautiful decorations, and memorable celebrations catered by Sri Mahalaxmi Caterers.">
    <title>Gallery - Sri Mahalaxmi Caterers</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/pages.css">
</head>

<body>
    <div class="preloader" id="preloader">
        <div class="preloader__spinner"></div>
        <div class="preloader__text">Sri Mahalaxmi Caterers</div>
    </div>

    <header class="header" id="site-header"></header>

    <section class="page-header">
        <div class="container">
            <div class="page-header__content">
                <h1 class="page-header__title">Our Gallery</h1>
                <div class="page-header__breadcrumb">
                    <a href="index.html">Home</a>
                    <span>›</span>
                    <span>Gallery</span>
                </div>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div class="section-header animate-on-scroll">
                <span class="section-header__label">Visual Showcase</span>
                <h2 class="section-header__title">Our Work in Pictures</h2>
                <div class="section-header__divider"></div>
                <p class="section-header__subtitle">A glimpse into the events and dishes that define our excellence.</p>
            </div>

            <!-- Gallery Filters -->
            <div class="gallery-filters" id="gallery-filters"></div>

            <!-- Gallery Grid -->
            <div class="gallery-grid" id="gallery-grid"></div>
        </div>
    </section>

    <section class="cta-section">
        <div class="container animate-on-scroll">
            <h2>Want Your Event to Look This Good?</h2>
            <p>Let us create a stunning culinary experience for your celebration.</p>
            <a href="contact.html" class="btn btn--primary btn--lg">Plan Your Event</a>
        </div>
    </section>

    <footer class="footer" id="site-footer"></footer>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox__close">&times;</button>
        <img class="lightbox__img" src="" alt="Gallery Preview">
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const data = getData();
            let activeFilter = 'all';

            const filtersContainer = document.getElementById('gallery-filters');
            const galleryGrid = document.getElementById('gallery-grid');

            const categories = ['all', ...new Set(data.gallery.map(g => g.category))];

            function renderFilters() {
                filtersContainer.innerHTML = categories.map(cat => `
          <button class="gallery-filter ${cat === activeFilter ? 'active' : ''}" data-filter="${cat}">
            ${cat.charAt(0).toUpperCase() + cat.slice(1)}
          </button>
        `).join('');

                filtersContainer.querySelectorAll('.gallery-filter').forEach(btn => {
                    btn.addEventListener('click', () => {
                        activeFilter = btn.dataset.filter;
                        renderFilters();
                        renderGallery();
                    });
                });
            }

            function renderGallery() {
                const filtered = activeFilter === 'all'
                    ? data.gallery
                    : data.gallery.filter(g => g.category === activeFilter);

                galleryGrid.innerHTML = filtered.map(item => `
          <div class="gallery-item" data-lightbox="${item.image}">
            <img src="${item.image}" alt="${item.caption}" loading="lazy">
            <div class="gallery-item__overlay">
              <div class="gallery-item__overlay-icon">🔍</div>
            </div>
          </div>
        `).join('');

                // Re-init lightbox for new items
                initLightbox();
            }

            renderFilters();
            renderGallery();
        });
    </script>
</body>

</html>
