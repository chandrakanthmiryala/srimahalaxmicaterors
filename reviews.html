<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Read what our customers say about Sri Mahalaxmi Caterers. Real reviews from real events - weddings, corporate functions, and celebrations.">
    <title>Customer Reviews - Sri Mahalaxmi Caterers</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/pages.css">
</head>

<body>
    <div class="preloader" id="preloader">
        <div class="preloader__spinner"></div>
        <div class="preloader__text">Sri Mahalaxmi Caterers</div>
    </div>

    <header class="header" id="site-header"></header>

    <section class="page-header">
        <div class="container">
            <div class="page-header__content">
                <h1 class="page-header__title">Customer Reviews</h1>
                <div class="page-header__breadcrumb">
                    <a href="index.html">Home</a>
                    <span>›</span>
                    <span>Reviews</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Submit Review -->
    <section class="section">
        <div class="container">
            <div class="review-form-section animate-on-scroll">
                <div class="section-header" style="margin-bottom:var(--space-2xl);">
                    <span class="section-header__label">Share Your Experience</span>
                    <h2 class="section-header__title">Write a Review</h2>
                    <div class="section-header__divider"></div>
                </div>
                <form class="review-form" id="review-form">
                    <div class="form-group">
                        <label for="reviewer-name">Your Name</label>
                        <input type="text" id="reviewer-name" placeholder="Enter your name" required>
                    </div>
                    <div class="form-group">
                        <label for="event-type">Event Type</label>
                        <select id="event-type" required>
                            <option value="">Select event type</option>
                            <option value="Wedding Reception">Wedding Reception</option>
                            <option value="Birthday Party">Birthday Party</option>
                            <option value="Corporate Event">Corporate Event</option>
                            <option value="Engagement Ceremony">Engagement Ceremony</option>
                            <option value="Festival Celebration">Festival Celebration</option>
                            <option value="House Warming">House Warming</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Rating</label>
                        <div class="star-rating" id="star-rating">
                            <span class="star" data-value="1">☆</span>
                            <span class="star" data-value="2">☆</span>
                            <span class="star" data-value="3">☆</span>
                            <span class="star" data-value="4">☆</span>
                            <span class="star" data-value="5">☆</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="review-text">Your Review</label>
                        <textarea id="review-text" placeholder="Share your experience with us..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn--primary">Submit Review</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Reviews List -->
    <section class="section section--light">
        <div class="container">
            <div class="section-header animate-on-scroll">
                <span class="section-header__label">Testimonials</span>
                <h2 class="section-header__title">What Our Clients Say</h2>
                <div class="section-header__divider"></div>
            </div>
            <div class="grid grid--3" id="reviews-grid"></div>
        </div>
    </section>

    <footer class="footer" id="site-footer"></footer>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const data = getData();
            let selectedRating = 0;

            // Star rating interaction
            const starContainer = document.getElementById('star-rating');
            const stars = starContainer.querySelectorAll('.star');

            stars.forEach(star => {
                star.addEventListener('mouseenter', () => {
                    const val = parseInt(star.dataset.value);
                    stars.forEach(s => {
                        s.textContent = parseInt(s.dataset.value) <= val ? '★' : '☆';
                        s.classList.toggle('filled', parseInt(s.dataset.value) <= val);
                    });
                });

                star.addEventListener('click', () => {
                    selectedRating = parseInt(star.dataset.value);
                    updateStars(selectedRating);
                });
            });

            starContainer.addEventListener('mouseleave', () => {
                updateStars(selectedRating);
            });

            function updateStars(rating) {
                stars.forEach(s => {
                    s.textContent = parseInt(s.dataset.value) <= rating ? '★' : '☆';
                    s.classList.toggle('filled', parseInt(s.dataset.value) <= rating);
                });
            }

            // Submit review
            document.getElementById('review-form').addEventListener('submit', (e) => {
                e.preventDefault();
                if (selectedRating === 0) {
                    showToast('Please select a rating', 'error');
                    return;
                }

                const newReview = {
                    id: Date.now(),
                    name: document.getElementById('reviewer-name').value,
                    rating: selectedRating,
                    event: document.getElementById('event-type').value,
                    date: new Date().toISOString().split('T')[0],
                    status: 'pending',
                    text: document.getElementById('review-text').value
                };

                const freshData = getData();
                freshData.reviews.push(newReview);
                saveData(freshData);

                showToast('Thank you! Your review has been submitted for approval.');
                e.target.reset();
                selectedRating = 0;
                updateStars(0);
            });

            // Render approved reviews
            renderReviews();

            function renderReviews() {
                const reviewsGrid = document.getElementById('reviews-grid');
                const approved = data.reviews.filter(r => r.status === 'approved');

                reviewsGrid.innerHTML = approved.map(review => `
          <div class="testimonial-card animate-on-scroll">
            <div class="testimonial-card__stars">${getStarRating(review.rating)}</div>
            <p class="testimonial-card__text">${review.text}</p>
            <div class="testimonial-card__author">
              <div style="width:50px;height:50px;border-radius:50%;background:var(--gradient-accent);display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:18px;">
                ${review.name.charAt(0)}
              </div>
              <div>
                <div class="testimonial-card__name">${review.name}</div>
                <div class="testimonial-card__event">${review.event}</div>
                <div style="font-size:var(--fs-xs);color:var(--color-dark-gray);margin-top:2px;">${new Date(review.date).toLocaleDateString('en-IN', { year: 'numeric', month: 'long', day: 'numeric' })}</div>
              </div>
            </div>
          </div>
        `).join('');

                initScrollAnimations();
            }
        });
    </script>
</body>

</html>
